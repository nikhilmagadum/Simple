<!DOCTYPE html>
<html lang="en">
<head>
    <title>Styled Webpage</title>
    <style>
        h1 {
            font-style: italic;
            font-size: 36px;
            background-color: lightblue;
            color: darkblue;
            text-align: center;
        }
        p {
            font-style: normal;
            font-size: 18px;
            background-color: lightslategray;
            color: black;
            text-align: left;
        }

    </style>
</head>
<body>
    <h1>Welcome to My Styled Webpage</h1>
    <p>This is a sample paragraph to demonstrate CSS styling</p>
</body>
</html>
