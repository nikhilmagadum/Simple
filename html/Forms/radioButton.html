<!DOCTYPE html>
<html>
<head>
    <title>Radio Input Example</title>
</head>
<body>
    <h2>Select Your Gender</h2>
    <form>
        <label>
            <input type="radio" name="gender" value="male"> Male
        </label><br>
        <label>
            <input type="radio" name="gender" value="female"> Female
        </label>
        <br><br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
