<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
</head>
<body>
    <h2>User Form</h2>
        <hr>
    <form action="">
        <label for="un">Name</label>
        <input type="text" name="username" id="un"  pattern="^[0-9]{10}$">
        <br><br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
