<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regular Expression</title>
</head>
<body>
    <h2>Regex Topic</h2>

    <form action="">
        <label for="number">Phone Number</label>
        <input type="text" name="mobileNumber" id="number"  pattern="^[0-9]{10}$">
        <!-- <input type="text" name="mobileNumber" id="number"  pattern="^\d{3}-\d{3}-\d{4}$"> -->
        <!-- <input type="text" name="mobileNumber" id="number"  pattern="^[6-9][0-9]{9}$"> -->
         <!-- <input type="text" name="mobileNumber" id="number"  pattern="^(\+\d{1,3})?\d{10}$"> -->
        <br><br>
        <label for="password">Password</label>
        
         <input type="password" name="password" id="password" pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$">
        <button type="submit">Submit</button>
    </form>
</body>

</html>
