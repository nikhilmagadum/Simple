<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tables in HTML</title>

</head>

<body>

    <table border="1" style="width: 50%;">

        <!-- 1st row -->

        <tr>

            <td colspan="4">1</td>

        </tr>

        <!-- 2nd row -->

        <tr>

            <td rowspan="2">1</td>

            <td>2</td>

            <td>3</td>

            <td rowspan="2">4</td>

        </tr>

        <!-- 3rd row -->

        <tr>

            <td>2</td>

            <td>3</td>

        </tr>

        <!-- 4th row -->

        <tr>

            <td colspan="4">1</td>

        </tr>

    </table>

</body>

</html>
