<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Span Table</title>
</head>
<body>
    <table border="1"  style="width: 50%;">
        <tr>
            <td colspan="4">1</td>
            <!-- <td>2</td>
            <td>3</td>
            <td>4</td> -->
        </tr>

            <tr aria-colspan="2">
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
        </tr>
            <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
        </tr>

            <tr>
            <td colspan="4">1</td>

        </tr>
    </table>
</body>
</html>
