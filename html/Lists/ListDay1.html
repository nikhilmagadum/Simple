<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists  in HTML</title>
</head>
<body>
    <h3> ordered list </h3>
      <ol type="a"  start="4"  reversed>
        <li>Biryani</li>
        <li>Dosa</li>
        <li>Idli</li>
        <li>Poori</li>
      </ol>

      <h3>Unordered List</h3>

      <UL type="disc">
        <li>chapathi</li>
        <li>Fried Rice</li>
        <li>Gobi manchurian</li>
      </UL>

      <h3>Defination List</h3>

      <dl>
    <dt>HTML</dt>
    <dd>Hyper Text Markup Language</dd>
    <dt>CSS</dt>
    <dd>Cascading Style Sheets</dd>
      </dl>

</body>
</html>
