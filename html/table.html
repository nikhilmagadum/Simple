<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML tables</title>
</head>
<body>
    <table border="1"> 

        <caption style="text-align: center; caption-side: bottom;">IPL TEAM Information</caption>
        <tr style="color: red;">
            <th>Sl. No.</th>
            <th>Name</th>
            <th>Team</th>
        </tr>

        <tr style="color: blue;">
            <td>1</td>
            <td>ABD</td>
            <td>RCB</td>
        </tr>

        <tr style="color: green;">
            <td>2</td>
            <td>Virat Kohli</td>
            <td>RCB</td>
        </tr>

        <tr style="color: orange;">
            <td>3</td>
            <td>DDP</td>
            <td>RCB</td>
        </tr>
    </table>
</body>
</html>
